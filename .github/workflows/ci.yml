name: CI

# Build, test, and lint the Exact2D CAD workspace on every push and PR.
on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # This project pins these in ~/.cargo/config on the dev machine; set here too so
  # CI runners that can't reach cert-revocation servers don't abort HTTPS fetches.
  CARGO_HTTP_CHECK_REVOKE: "false"

jobs:
  test:
    name: build · test · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
